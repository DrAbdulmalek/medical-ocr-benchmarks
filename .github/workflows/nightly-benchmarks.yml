name: Nightly Benchmarks

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus on specific benchmark (or "all")'
        required: false
        default: 'all'

permissions:
  contents: read
  issues: write

jobs:
  benchmark:
    name: Run Benchmarks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[full]"

      - name: Run benchmark suite
        run: |
          if [ "${{ github.event.inputs.focus }}" != "" ] && [ "${{ github.event.inputs.focus }}" != "all" ]; then
            python -m benchmarks.runner --focus "${{ github.event.inputs.focus }}" --output results/nightly-${{ matrix.python-version }}.json
          else
            python -m benchmarks.runner --output results/nightly-${{ matrix.python-version }}.json
          fi
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-py${{ matrix.python-version }}
          path: results/
          retention-days: 30

      - name: Generate summary report
        run: |
          echo "## Benchmark Results (Python ${{ matrix.python-version }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/nightly-${{ matrix.python-version }}.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat results/nightly-${{ matrix.python-version }}.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No results generated." >> $GITHUB_STEP_SUMMARY
          fi

  regression-check:
    name: Check for Regressions
    runs-on: ubuntu-latest
    needs: benchmark
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-results-py*
          path: results/
          merge-multiple: true

      - name: Compare with baseline
        run: |
          pip install rapidfuzz rich
          python scripts/compare_baselines.py --results-dir results/ --threshold 5.0 || true
        continue-on-error: true

      - name: Create issue on regression
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const date = new Date().toISOString().split('T')[0];
            const title = ` Benchmark Regression Detected - ${date}`;
            
            // Check if open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'regression'
            });
            
            if (issues.data.length > 0) {
              console.log('Open regression issue already exists, commenting instead');
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: `Nightly benchmark run on ${date} detected a regression.\n\n[View full results in Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `Nightly benchmark run on ${date} detected a regression.\n\n[View full results in Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n## Next Steps\n- Review the benchmark results artifact\n- Identify the root cause\n- Fix or update baseline if expected`,
                labels: ['regression', 'automated']
              });
            }
